<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200">
    <rect x="50" y="20" rx="20" ry="20" width="150" height="150" 
    style="fill:brown;stroke:black;stroke-width:5;opacity:1" />
    <circle cx="80" cy="80" r="20" stroke="red" stroke-width="3" fill="white"></circle>
    <circle cx="150" cy="80" r="30" stroke="red" stroke-width="3" fill="white"></circle>
    <rect x="70" y="140" width="100" height="20" stroke="red" stroke-width="2" fill="" />
    <animateTransform
    attributeName="transform"
    begin="0s"
    dur="1"
    type="rotate"
    from="0 85 85"
    to="360 185 195"
    repeatCount="indefinite" />

</svg>